    margin: 0;
    background: #0f172a;
    color: #e2e8f0;
}

header {
    text-align: center;
    padding: 30px 20px;
    background: #020617;
    border-bottom: 1px solid #1e293b;
}

.container {
    padding: 30px;
    max-width: 1200px;
    margin: auto;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 25px;
}

.card {
    background: #020617;
    border: 1px solid #1e293b;
    border-radius: 16px;
    padding: 15px;
    text-align: center;
}

.card img {
    width: 100%;
    height: 140px;
    object-fit: contain;
    background: white;
    border-radius: 10px;
    padding: 10px;
}

.btn {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 14px;
    border-radius: 8px;
    background: #38bdf8;
    color: black;
    text-decoration: none;
    font-weight: bold;
}

footer {
    text-align: center;
    padding: 20px;
    color: #64748b;
}

#loginScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #020617;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.login-box {
    background: #0f172a;
    padding: 30px;
    border-radius: 16px;
    text-align: center;
    border: 1px solid #1e293b;
    width: 300px;
}

.login-box input {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    border-radius: 8px;
}

.login-box button {
    margin-top: 15px;
    width: 100%;
    padding: 10px;
    background: #38bdf8;
    border: none;
    border-radius: 8px;
}

#errorMsg {
    color: red;
    margin-top: 10px;
}
